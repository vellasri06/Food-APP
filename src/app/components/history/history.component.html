<div class="history">

  <h2>Order History</h2>

  <table>

    <tr>
      <th>Item</th>
      <th>Price</th>
      <th>Qty</th>
      <th>Status</th>
    </tr>

    <ng-container *ngFor="let order of orders">

      <tr *ngFor="let item of order.items">

        <td>{{ item.name }}</td>
        <td>₹{{ item.price }}</td>
        <td>{{ item.qty }}</td>

        <td>
          <span class="status" [ngClass]="order.status">
            {{ order.status }}
          </span>
        </td>

      </tr>

      <!-- Total Row -->
      <tr class="total-row">
        <td colspan="4">Total: ₹{{ order.total }}</td>
      </tr>

    </ng-container>

  </table>

</div>
